name: Generate Snake Animation

on:
  schedule:
    - cron: "0 * * * *" # Runs automatically every single hour
  workflow_dispatch: # Allows manual button-clicks to update it instantly
  push: # regenerate immediately whenever main is updated
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 💡 ADD THESE LINES TO FORCE WRITE PERMISSIONS VIA CODE
    permissions:
      contents: write
      
    steps:
      - name: Generate Snake Files
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: technikky
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push Animation to Output Branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
